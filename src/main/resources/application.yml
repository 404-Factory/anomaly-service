server:
  port: 8083

spring:
  application:
    name: anomaly-service
  profiles:
    default: dev

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        spring.json.add.type.headers: false

    consumer:
      group-id: anomaly-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        spring.json.trusted.packages: "*"

sigma:
  event:
    consumer:
      topics: "Analysis.event"
      groupId: "anomaly-consumer-group"
      subscription:
        - "AnalysisCompleted"
    producer:
      topic: "management-event"

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: never

app:
  event:
    publish-enabled: ${EVENT_PUBLISH_ENABLED:false}
  kafka:
    consumer:
      violation-topic: ${KAFKA_VIOLATIONS_TOPIC:sensor-violations}
      violation-group-id: ${KAFKA_VIOLATIONS_GROUP_ID:anomaly-violation-group}
  chatbot-service:
    url: ${CHATBOT_SERVICE_URL:http://localhost:8085}
