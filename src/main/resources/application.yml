server:
  port: 8080

spring:
  application:
    name: anomaly-service
  profiles:
    default: dev

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: anomaly-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      ack-mode: record

sigma:
  event:
    consumer:
      topics: sensor-violations
      groupId: anomaly-service
      subscription:
        - SensorViolation

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: never